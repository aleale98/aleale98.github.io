<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Un pensiero alla volta</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #fffaf1;
      --ink: #2f2b26;
      --muted: #7f7468;
      --rose: #d98c91;
      --shadow: 0 20px 44px rgba(72, 49, 39, .16);
      font-family: "Avenir Next", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100svh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 8%, rgba(217, 140, 145, .18), transparent 28%),
        radial-gradient(circle at 86% 4%, rgba(138, 168, 153, .18), transparent 26%),
        linear-gradient(145deg, #fffdf8, var(--paper));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .36;
      background-image:
        linear-gradient(rgba(111, 94, 77, .045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(111, 94, 77, .035) 1px, transparent 1px);
      background-size: 22px 22px;
      mask-image: linear-gradient(to bottom, black, transparent 88%);
    }

    .app {
      position: relative;
      width: min(100%, 520px);
      margin: 0 auto;
      padding: max(22px, env(safe-area-inset-top)) 18px max(28px, env(safe-area-inset-bottom));
    }

    .top {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 0 -18px 18px;
      padding: 16px 18px 14px;
      text-align: center;
      background: linear-gradient(to bottom, rgba(255, 250, 241, .96), rgba(255, 250, 241, .78), transparent);
      backdrop-filter: blur(8px);
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(32px, 11vw, 48px);
      font-weight: 500;
      letter-spacing: 0;
      line-height: .96;
    }

    .feed {
      display: grid;
      gap: 30px;
      padding: 8px 0 20px;
    }

    .polaroid {
      position: relative;
      width: min(100%, 430px);
      margin: 0 auto;
      padding: 14px 14px 20px;
      border-radius: 6px;
      background: #fffdf8;
      box-shadow: var(--shadow);
      transform: rotate(var(--tilt));
    }

    .polaroid:nth-child(even) {
      transform: rotate(calc(var(--tilt) * -1));
    }

    .polaroid::before {
      content: "";
      position: absolute;
      top: -9px;
      left: 50%;
      width: 86px;
      height: 24px;
      border-radius: 3px;
      background: rgba(233, 211, 174, .72);
      box-shadow: 0 2px 8px rgba(65, 48, 37, .08);
      transform: translateX(-50%) rotate(-3deg);
      mix-blend-mode: multiply;
    }

    .art {
      position: relative;
      height: clamp(128px, 28vw, 178px);
      overflow: hidden;
      border-radius: 4px;
      background: linear-gradient(135deg, var(--a), var(--b));
    }

    .art::before,
    .art::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      opacity: .72;
    }

    .art::before {
      width: 126px;
      height: 126px;
      top: 16px;
      right: -24px;
      background: rgba(255, 255, 255, .34);
    }

    .art::after {
      width: 92px;
      height: 92px;
      left: 22px;
      bottom: -26px;
      border: 2px solid rgba(255, 255, 255, .52);
    }

    .symbol {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: rgba(255, 255, 255, .88);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(66px, 22vw, 100px);
      line-height: 1;
      text-shadow: 0 10px 30px rgba(75, 54, 45, .14);
    }

    .message {
      padding: 18px 7px 0;
    }

    .message-text {
      margin: 0;
      color: #332d27;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(17px, 4.55vw, 20px);
      line-height: 1.48;
      white-space: pre-line;
      overflow-wrap: anywhere;
      word-break: normal;
      hyphens: auto;
    }

    .message-text.long {
      font-size: clamp(15px, 4vw, 18px);
      line-height: 1.45;
    }

    .signature {
      margin: 16px 0 0;
      color: #5f5147;
      font-family: "Segoe Print", "Bradley Hand ITC", "Comic Sans MS", cursive;
      font-size: 21px;
      line-height: 1.1;
      text-align: right;
      overflow-wrap: anywhere;
    }

    .number {
      position: absolute;
      top: 26px;
      right: 26px;
      display: grid;
      place-items: center;
      min-width: 34px;
      height: 28px;
      padding: 0 9px;
      border-radius: 999px;
      color: rgba(47, 43, 38, .72);
      background: rgba(255, 255, 255, .64);
      font-size: 12px;
      font-weight: 700;
    }

    .loader,
    .error {
      max-width: 320px;
      margin: 40px auto;
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
    }

    @media (min-width: 720px) {
      .app {
        padding-inline: 28px;
      }

      .top {
        margin-inline: -28px;
        padding-inline: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <p class="eyebrow">per Ilaria</p>
      <h1>Un pensiero alla volta</h1>
    </header>

    <section class="feed" id="feed" aria-live="polite">
      <p class="loader">Carico i pensieri...</p>
    </section>
  </main>

  <script>
    const themes = {
      cura: { a: "#d98c91", b: "#f2d3bd", symbol: "✿" },
      energia: { a: "#e7b85d", b: "#d97373", symbol: "✦" },
      coro: { a: "#8aa899", b: "#6f91bd", symbol: "♫" },
      autenticita: { a: "#c493b8", b: "#efc8a7", symbol: "♡" },
      amicizia: { a: "#df9a78", b: "#8ab7b0", symbol: "∞" },
      talento: { a: "#a77bd8", b: "#f0b86e", symbol: "★" },
      dolce: { a: "#f1a7b8", b: "#f6d6a8", symbol: "♡" },
      sorriso: { a: "#f3c85f", b: "#ec8f78", symbol: "☺" },
      sole: { a: "#f6c85f", b: "#8ec7b5", symbol: "☀" },
      musica: { a: "#7fa9d8", b: "#b68bd6", symbol: "♪" },
      default: { a: "#d98c91", b: "#8aa899", symbol: "✧" }
    };

    const fallbackCsv = `autore,tema,frase
"Eulalia","cura","Grazie per tutte le piccole attenzioni che mi hai donato. Per ogni volta che guardandomi, con gioia hai sorriso, perché mi hai fatto sentire voluta bene. Mi sono sentita custodita. Grazie per la cura e l'affetto che hai messo nei miei confronti. Per i consigli e gli abbracci, tanti auguri di buon compleanno."
"Giuseppe","energia","Auguri Ila! Grazie per tutta l'assistenza che mi dedichi ogni volta... Sei la migliore fioraia/cuoca/pianista/medico/soffocatrice del judo."
"Cristina","coro","Buon compleanno Ilaria!
Ricordo ancora la prima volta che ti ho incontrata.
Era una domenica di marzo, alla Messa delle 19 in Duomo e, finita la celebrazione, mi ero avvicinata per chiederti se potessi entrare a fare parte del coro.
Tu con un sorriso mi hai risposto subito di sì.
Così è iniziata per me questa avventura nel vostro gruppo e la nostra amicizia.
Quanti bei momenti abbiamo vissuto insieme!
Le prove del venerdì, tra canti e risate e gli immancabili meme di Samu erano per me il momento più atteso della settimana.
In questo giorno così speciale, vorrei ringraziarti per il tuo impegno costante nel seguire il coro e nella preparazione dei canti.
Ammiro davvero la tua capacità di riuscire a mantenere i vari impegni nonostante la mole di studio che richiede la facoltà di Medicina.
Grazie anche per essermi stata accanto, sempre disponibile ad aiutarmi, qualora ne avessi necessità."
"Fra","autenticita","Auguri piccola (media) Ila,
non perdere mai l’autenticità della personcina speciale che sei."
"Marti","amicizia","Tanti auguri amica mia, grazie per esserci sempre, per tutti i consigli e l'aiuto che mi dai! Ti voglio tanto bene <3"
"Viola","talento","Tanti auguri a una delle ragazze più cool e talentuose che conosco. Da grandi vorremmo diventare tutte un po’ Ilaria"
"Alessia","dolce","Tanti auguri di buon compleanno Ila 🥳Ti auguro una giornata speciale, proprio come te. Anche se sei ormai cresciuta, per me rimani la dolce e cara piccola Ila
😘Tanti tanti auguriii!!"
"Benny V","sorriso","Tantissimissimi auguriii Ilaa !! Ti auguro di realizzare tutto ciò che desideri! Non perdere mai il tuo sorriso! ti voglio bene e ancora auguriiiii ❤️"
"miri :)","sole","tanti tanti augurii Ila! Sono molto contenta di aver conosciuto una persona fantastica e talentuosa, ti auguro il meglio!! ❤️
ps: siamo noi la coppia più bella non loro hihi"
"Vinc","musica","Tanti auguri Ila!
Non smettere mai di credere in quello che fai ma soprattutto in quello che sei, ti auguro di raggiungere tutti i traguardi con la radiosità e la determinazione che ti contraddistingue.
P.S. se hai fatto l’attacco del canto dell’amore puoi fare tutto"`;

    const feed = document.querySelector("#feed");

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let field = "";
      let quoted = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"') {
          if (quoted && next === '"') {
            field += '"';
            i += 1;
          } else {
            quoted = !quoted;
          }
        } else if (char === "," && !quoted) {
          row.push(field);
          field = "";
        } else if ((char === "\n" || char === "\r") && !quoted) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(field);
          if (row.some(Boolean)) rows.push(row);
          row = [];
          field = "";
        } else {
          field += char;
        }
      }

      row.push(field);
      if (row.some(Boolean)) rows.push(row);
      const headers = rows.shift().map((item) => item.trim());
      return rows.map((cells) => Object.fromEntries(headers.map((key, index) => [key, (cells[index] || "").trim()])));
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function render(entries) {
      feed.innerHTML = entries.map((entry, index) => {
        const theme = themes[entry.tema] || themes.default;
        const longText = entry.frase.length > 520 ? " long" : "";
        const tilt = `${((index % 5) - 2) * 0.75}deg`;

        return `
          <article class="polaroid" style="--a: ${theme.a}; --b: ${theme.b}; --tilt: ${tilt}">
            <span class="number">${index + 1}/${entries.length}</span>
            <div class="art" aria-hidden="true">
              <div class="symbol">${theme.symbol}</div>
            </div>
            <div class="message">
              <p class="message-text${longText}">${escapeHtml(entry.frase)}</p>
              <p class="signature">${escapeHtml(entry.autore)}</p>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadEntries() {
      if (window.location.protocol === "file:") {
        return parseCsv(fallbackCsv).filter((entry) => entry.frase);
      }

      try {
        const response = await fetch("frasi.csv", { cache: "no-store" });
        if (!response.ok) throw new Error("CSV non trovato");
        return parseCsv(await response.text()).filter((entry) => entry.frase);
      } catch (error) {
        return parseCsv(fallbackCsv).filter((entry) => entry.frase);
      }
    }

    loadEntries()
      .then(render)
      .catch(() => {
        feed.innerHTML = `<p class="error">Non riesco a caricare i pensieri.</p>`;
      });
  </script>
</body>
</html>
